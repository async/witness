<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1560 460" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif">
  <style>
    .card { fill: #f6f8fa; stroke: #d0d7de; stroke-width: 1.5; }
    .name { fill: #1f2328; font-size: 21px; font-weight: 600; font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace; }
    .arrow { stroke: #818b98; fill: none; }
    .arrowhead { fill: #818b98; }
    @media (prefers-color-scheme: dark) {
      .card { fill: #161b22; stroke: #3d444d; }
      .name { fill: #e6edf2; }
      .arrow { stroke: #767e89; }
      .arrowhead { fill: #767e89; }
    }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" class="arrowhead"/>
    </marker>
  </defs>

  <g fill="#F9A8D4">
    <path d="M330 60 l4.5 13 13 4.5 -13 4.5 -4.5 13 -4.5 -13 -13 -4.5 13 -4.5 Z"/>
    <path d="M1180 380 l4.5 13 13 4.5 -13 4.5 -4.5 13 -4.5 -13 -13 -4.5 13 -4.5 Z"/>
  </g>
  <g fill="#FB923C">
    <path d="M180 350 l3.5 10 10 3.5 -10 3.5 -3.5 10 -3.5 -10 -10 -3.5 10 -3.5 Z" opacity="0.9"/>
    <path d="M1330 64 l3.5 10 10 3.5 -10 3.5 -3.5 10 -3.5 -10 -10 -3.5 10 -3.5 Z" opacity="0.9"/>
  </g>
  <g fill="#EC4899" opacity="0.75">
    <circle cx="540" cy="396" r="4"/>
    <circle cx="1020" cy="58" r="4"/>
  </g>

  <!-- left chain: cli -> discovery -> runner -->
  <rect x="30" y="198" width="100" height="64" rx="10" class="card"/>
  <text x="80" y="238" text-anchor="middle" class="name">cli/</text>

  <line x1="142" y1="230" x2="168" y2="230" class="arrow" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="184" y="198" width="196" height="64" rx="10" class="card"/>
  <text x="282" y="238" text-anchor="middle" class="name">discovery.ts</text>

  <line x1="392" y1="230" x2="418" y2="230" class="arrow" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="434" y="198" width="160" height="64" rx="10" class="card"/>
  <text x="514" y="238" text-anchor="middle" class="name">runner.ts</text>

  <!-- fan out to the middle stack -->
  <path d="M606 214 C 650 180, 660 122, 700 100" class="arrow" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="606" y1="230" x2="700" y2="230" class="arrow" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M606 246 C 650 280, 660 338, 700 360" class="arrow" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <!-- middle stack -->
  <rect x="716" y="62" width="244" height="64" rx="10" class="card"/>
  <text x="838" y="102" text-anchor="middle" class="name">project.ts</text>

  <rect x="716" y="198" width="244" height="64" rx="10" class="card"/>
  <text x="838" y="226" text-anchor="middle" class="name">build.ts</text>
  <text x="838" y="252" text-anchor="middle" class="name">preview.ts</text>

  <rect x="716" y="328" width="244" height="64" rx="10" class="card"/>
  <text x="838" y="368" text-anchor="middle" class="name">browser.ts</text>

  <!-- fan in to evidence -->
  <path d="M972 100 C 1016 122, 1026 180, 1066 214" class="arrow" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="972" y1="230" x2="1066" y2="230" class="arrow" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M972 360 C 1016 338, 1026 280, 1066 246" class="arrow" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="1082" y="198" width="190" height="64" rx="10" class="card"/>
  <text x="1177" y="238" text-anchor="middle" class="name">evidence.ts</text>

  <line x1="1284" y1="230" x2="1310" y2="230" class="arrow" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="1326" y="198" width="160" height="64" rx="10" class="card"/>
  <text x="1406" y="238" text-anchor="middle" class="name">expect.ts</text>

  <!-- receipt below expect -->
  <path d="M1406 264 C 1406 290, 1406 300, 1406 326" class="arrow" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="1316" y="342" width="180" height="64" rx="10" class="card"/>
  <text x="1406" y="382" text-anchor="middle" class="name">receipt.ts</text>
</svg>
