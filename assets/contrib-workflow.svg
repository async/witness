<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1560 220" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif">
  <style>
    .card { fill: #f6f8fa; stroke: #d0d7de; stroke-width: 1.5; }
    .title { fill: #1f2328; font-size: 23px; font-weight: 600; }
    .muted { fill: #59636e; font-size: 20px; }
    .mono { font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace; }
    .ok { fill: #1a7f37; font-size: 23px; font-weight: 600; }
    .arrow { stroke: #818b98; }
    .arrowhead { fill: #818b98; }
    @media (prefers-color-scheme: dark) {
      .card { fill: #161b22; stroke: #3d444d; }
      .title { fill: #e6edf2; }
      .muted { fill: #9198a1; }
      .ok { fill: #3fb950; }
      .arrow { stroke: #767e89; }
      .arrowhead { fill: #767e89; }
    }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" class="arrowhead"/>
    </marker>
  </defs>

  <g fill="#F9A8D4">
    <path d="M96 28 l4.5 13 13 4.5 -13 4.5 -4.5 13 -4.5 -13 -13 -4.5 13 -4.5 Z"/>
    <path d="M1136 158 l4.5 13 13 4.5 -13 4.5 -4.5 13 -4.5 -13 -13 -4.5 13 -4.5 Z"/>
  </g>
  <g fill="#FB923C">
    <path d="M580 162 l3.5 10 10 3.5 -10 3.5 -3.5 10 -3.5 -10 -10 -3.5 10 -3.5 Z" opacity="0.9"/>
    <path d="M900 26 l3.5 10 10 3.5 -10 3.5 -3.5 10 -3.5 -10 -10 -3.5 10 -3.5 Z" opacity="0.9"/>
  </g>
  <g fill="#EC4899" opacity="0.75">
    <circle cx="372" cy="34" r="4"/>
    <circle cx="1490" cy="170" r="4"/>
  </g>

  <rect x="30" y="62" width="262" height="96" rx="12" class="card"/>
  <text x="161" y="102" text-anchor="middle" class="title">1 · check</text>
  <text x="161" y="136" text-anchor="middle" class="muted mono">specs/</text>

  <line x1="304" y1="110" x2="332" y2="110" class="arrow" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="348" y="62" width="262" height="96" rx="12" class="card"/>
  <text x="479" y="102" text-anchor="middle" class="title">2 · failing</text>
  <text x="479" y="136" text-anchor="middle" class="muted">test first</text>

  <line x1="622" y1="110" x2="650" y2="110" class="arrow" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="666" y="62" width="262" height="96" rx="12" class="card"/>
  <text x="797" y="102" text-anchor="middle" class="title">3 · smallest</text>
  <text x="797" y="136" text-anchor="middle" class="muted">fix</text>

  <line x1="940" y1="110" x2="968" y2="110" class="arrow" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="984" y="62" width="280" height="96" rx="12" class="card"/>
  <text x="1124" y="102" text-anchor="middle" class="title">4 · verify</text>
  <text x="1124" y="136" text-anchor="middle" class="muted mono">test · build · check</text>

  <line x1="1276" y1="110" x2="1304" y2="110" class="arrow" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="1320" y="62" width="210" height="96" rx="12" class="card"/>
  <text x="1425" y="119" text-anchor="middle" class="ok">PR 🎉</text>
</svg>
