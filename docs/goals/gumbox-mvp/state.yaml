    inputs:
      - notes/T003-judge-decision.md
      - notes/T001-spec-inventory.md
      - specs/box-authoring.md
      - specs/scenarios-and-receipts.md
    allowed_files:
      - "src/**"
      - "test/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "vite.config.ts"
      - "tsconfig.json"
      - "docs/goals/gumbox-mvp/notes/T004-*.md"
    verify:
      - "pnpm test"
      - "pnpm run build"
      - "pnpm run check"
    stop_if:
      - "Any change needed outside this repo, or qwik-bundler touched/resolved at test time."
      - "Slice seems to require Playwright or any browser dependency (that is slice 4)."
      - "Vite 8.0.16 Environment API lacks a needed hook and a spec deviation would be required — record the conflict and stop."
      - "Tests only pass with blind sleeps instead of event-driven waits."
      - "Verification fails twice."
    receipt:
      result: done
      changed_files: [src/index.ts, src/types.ts, src/box.ts, src/discovery.ts, src/runner.ts, src/project.ts, src/environments.ts, src/evidence.ts, src/expect.ts, src/receipt.ts, test/gumbox.test.ts, "test/fixtures/basic/**", tsconfig.json, vite.config.ts]
      commands:
        - { cmd: "pnpm test", status: pass, detail: "2 files, 5 tests passed; PM re-verified independently" }
        - { cmd: "pnpm run build", status: pass }
        - { cmd: "pnpm run check", status: pass }
      summary: "Core runtime end-to-end with no browser: box() brand, discoverBoxes via vite runnerImport, runBoxes with createServer + env capability gating, project.edit with diff + guaranteed restore, evidence via wrapped hot-channel + hotUpdate hooks + real Node WebSocket, normalized EnvironmentEditOutcome, expect recording pass+fail, versioned receipt + latest pointer. Committed as 89dab41."
      notes:
