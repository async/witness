goal:
  slug: gumbox-mvp
  title: "Gumbox MVP Implementation"
  status: active
  mode: specific
  oracle: "pnpm test green with spec-behavior tests against a real Vite pipeline; final Judge spec-conformance audit"
agents:
  scout: installed
  judge: installed
  worker: installed
tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: active
    objective: "Map all five spec files (cli, box-authoring, runtime-routes, scenarios-and-receipts, product-direction) into a concrete required-behavior inventory for the MVP wedge."
    inputs:
      - specs/README.md
      - specs/product-direction.md
      - specs/cli.md
      - specs/box-authoring.md
      - specs/runtime-routes.md
      - specs/scenarios-and-receipts.md
    expected_output:
      - "Required public API surface"
      - "Required CLI behavior"
      - "Required receipt shape"
      - "MVP-vs-later boundary as stated by the specs"
    receipt:
      result: done
      note: notes/T001-spec-inventory.md
      summary: "Specs mandate box() authoring with six-key context (environment, browser, project, pipeline, expect, receipt), environment.<name> from resolved Vite environments with recorded browser alias, namespaced expect surfaces, 8 MVP CLI commands, /__gumbox dev/preview middleware, durable receipts under .gumbox/receipts with EnvironmentEditOutcome model. Current code is a no-op plugin shell (~0% implemented)."
      contradictions:
        - "MVP scope: box-authoring.md 'first HMR/config receipt MVP' vs cli.md's eight MVP commands"
        - "Fixtures: manual registration acceptable (product-direction) vs *.box.ts discovery as happy path (scenarios-and-receipts)"
      ambiguity_for_judge:
        - "CLI exit codes unspecified; receipt on-disk format unspecified; raw browser access in MVP undecided"
  - id: T002
    type: scout
    assignee: Scout
    status: queued
    objective: "Inventory /Users/jacksm5pro/dev/open-source/qwik-bundler/scripts/ for the smoke-script patterns gumbox must replace; extract 2-4 canonical fixture scenarios."
    inputs:
      - /Users/jacksm5pro/dev/open-source/qwik-bundler/scripts/
    expected_output:
      - "Per-script summary of what it starts, mutates, asserts, and leaves behind"
      - "2-4 canonical scenarios expressed in gumbox terms (state setup -> environment -> evidence -> receipt)"
    receipt:
      result: done
      note: notes/T002-qwik-bundler-scripts.md
      summary: "13 scripts inventoried. Only shared helper is a mkdir-mutex lock; server boot, mutate/restore, polling, Playwright wiring copy-pasted ~7x. Three families: live-edit HMR (mutate fixture then finally-restore), dev-server fetch/browser checks, artifact scans assuming prior builds. Four canonical gumbox scenarios extracted: client HMR edit, SSR HMR with state preservation, build artifact scan, multi-environment workerd dev."
  - id: T003
    type: judge
    assignee: Judge
    status: done
    objective: "From T001+T002 receipts, choose the first largest safe Worker slice and define its allowed_files, verify commands, and stop_if."
    receipt:
      result: done
      decision: approved
      full_outcome_complete: false
      note: notes/T003-judge-decision.md
      rationale: "Slice 1 = core runtime vertical (box authoring, discovery, pipeline.dev, capability-gated environments, watcher-driven project.edit with restore, normalized edit outcomes, JSON receipts) proven by pnpm test against in-repo framework-free fixture. Browser deferred to slice 4, CLI to slice 3. Ambiguities resolved: receipt format (versioned JSON + latest pointer), exit codes 0/1/2, in-repo fixture strategy."
  - id: T004
    type: worker
    assignee: Worker
    status: active
    objective: "Implement the core Gumbox runtime as one vertical slice — box() authoring surface, *.box.ts(x) discovery/loading, pipeline.dev() via createServer, environment.<name> capability gating (request/import), project.edit with watcher-driven HMR evidence and guaranteed restore, a minimal expect.environment/expect.pipeline/expect.html namespace, and a versioned JSON receipt written to .gumbox/receipts — proven end-to-end by pnpm test against a new minimal in-repo Vite fixture, with no browser dependency."
    inputs:
      - notes/T003-judge-decision.md
      - notes/T001-spec-inventory.md
      - specs/box-authoring.md
      - specs/scenarios-and-receipts.md
    allowed_files:
      - "src/**"
      - "test/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "vite.config.ts"
      - "tsconfig.json"
      - "docs/goals/gumbox-mvp/notes/T004-*.md"
    verify:
      - "pnpm test"
      - "pnpm run build"
      - "pnpm run check"
    stop_if:
      - "Any change needed outside this repo, or qwik-bundler touched/resolved at test time."
      - "Slice seems to require Playwright or any browser dependency (that is slice 4)."
      - "Vite 8.0.16 Environment API lacks a needed hook and a spec deviation would be required — record the conflict and stop."
      - "Tests only pass with blind sleeps instead of event-driven waits."
      - "Verification fails twice."
    receipt: null
  - id: T005
    type: worker
    assignee: Worker
    status: queued
    objective: "Slice 2: project.edit.create/remove/copy/config, expect.pipeline.serverRestarted, pipeline.build() via createBuilder with build() fallback, build.artifact(), expect.build.* / expect.artifact.* — covers canonical scenario 3 (build artifact scan + forbidden-string leakage check) with a build fixture."
    allowed_files: []
    verify: []
    stop_if: []
    receipt: null
  - id: T006
    type: worker
    assignee: Worker
    status: queued
    objective: "Slice 3: CLI entry — bin wiring, gumbox [selector] / run / list, selector matching (path, glob, name, basename, tag), --json, --receipt-dir, exit codes 0/1/2, receipt path printed on failure. Completes the tranche oracle."
    allowed_files: []
    verify: []
    stop_if: []
    receipt: null
  - id: T007
    type: worker
    assignee: Worker
    status: queued
    objective: "Slice 4: browser evidence — Playwright dependency, browser/environment.client.visit(), expect.page.*, screenshots + console/network capture into receipts, pipeline.preview(build) + preview.browser.visit, browser-alias-target recording."
    allowed_files: []
    verify: []
    stop_if: []
    receipt: null
  - id: T008
    type: worker
    assignee: Worker
    status: queued
    objective: "Slice 5: /__gumbox dev middleware — box metadata, state gallery listing, local-only receipt APIs, dev/preview-port-only guarantee, reject-remote-host default; gumbox open."
    allowed_files: []
    verify: []
    stop_if: []
    receipt: null
  - id: T009
    type: worker
    assignee: Worker
    status: queued
    objective: "Slice 6: typegen (.gumbox/types ambient GumboxProjectTypes with Known<T> unions) + gumbox types, then doctor and replay."
    allowed_files: []
    verify: []
    stop_if: []
    receipt: null
  - id: T999
    type: judge
    assignee: Judge
    status: queued
    objective: "Audit whether the implemented tranche satisfies the original outcome: gumbox follows the specs and can express at least one canonical qwik-bundler script scenario end-to-end with receipts, verified by pnpm test."
    inputs:
      - "All done task receipts"
      - "Last verification"
      - "Current dirty diff"
    expected_output:
      - "complete | not_complete"
      - "full_outcome_complete: true | false"
      - "missing evidence"
      - "next task if not complete"
    receipt: null
